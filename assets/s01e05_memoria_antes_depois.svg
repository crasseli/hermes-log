<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="redBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="amberBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="700" height="480" fill="#f8fafc" rx="12"/>

  <!-- Card principal -->
  <rect x="30" y="20" width="640" height="440" fill="white" rx="12" filter="url(#cardShadow)"/>

  <!-- Titulo -->
  <text x="350" y="55" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Ocupacao de Memoria: Antes vs Depois</text>
  <text x="350" y="75" text-anchor="middle" font-size="12" fill="#94a3b8">memory_char_limit e user_char_limit — dados reais de ocupacao</text>

  <!-- Grid horizontal -->
  <line x1="90" y1="110" x2="630" y2="110" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="90" y1="160" x2="630" y2="160" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="90" y1="210" x2="630" y2="210" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="90" y1="260" x2="630" y2="260" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="90" y1="310" x2="630" y2="310" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="90" y1="360" x2="630" y2="360" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Eixo Y labels -->
  <text x="80" y="114" text-anchor="end" font-size="10" fill="#94a3b8">100%</text>
  <text x="80" y="164" text-anchor="end" font-size="10" fill="#94a3b8">80%</text>
  <text x="80" y="214" text-anchor="end" font-size="10" fill="#94a3b8">60%</text>
  <text x="80" y="264" text-anchor="end" font-size="10" fill="#94a3b8">40%</text>
  <text x="80" y="314" text-anchor="end" font-size="10" fill="#94a3b8">20%</text>
  <text x="80" y="364" text-anchor="end" font-size="10" fill="#94a3b8">0%</text>

  <!-- ===================== GRUPO 1: MEMORY ===================== -->

  <!-- MEMORY - Cohen Antes (99%) -->
  <rect x="120" y="110.5" width="65" height="249.5" fill="url(#redBar)" rx="6" opacity="0.9"/>
  <text x="152" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">99%</text>
  <text x="152" y="378" text-anchor="middle" font-size="9" fill="#64748b">Cohen</text>
  <text x="152" y="390" text-anchor="middle" font-size="8" fill="#94a3b8">3.144/3.200</text>

  <!-- MEMORY - Hermes Antes (84%) -->
  <rect x="200" y="149" width="65" height="211" fill="url(#amberBar)" rx="6" opacity="0.9"/>
  <text x="232" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">84%</text>
  <text x="232" y="378" text-anchor="middle" font-size="9" fill="#64748b">Hermes</text>
  <text x="232" y="390" text-anchor="middle" font-size="8" fill="#94a3b8">2.716/3.200</text>

  <!-- MEMORY - Cohen Depois (31%) -->
  <rect x="320" y="273" width="65" height="87" fill="url(#greenBar)" rx="6" opacity="0.9"/>
  <text x="352" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">31%</text>
  <text x="352" y="378" text-anchor="middle" font-size="9" fill="#64748b">Cohen</text>
  <text x="352" y="390" text-anchor="middle" font-size="8" fill="#94a3b8">3.144/10.000</text>

  <!-- MEMORY - Hermes Depois (31%) -->
  <rect x="400" y="273" width="65" height="87" fill="url(#greenBar)" rx="6" opacity="0.9"/>
  <text x="432" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">31%</text>
  <text x="432" y="378" text-anchor="middle" font-size="9" fill="#64748b">Hermes</text>
  <text x="432" y="390" text-anchor="middle" font-size="8" fill="#94a3b8">2.716/10.000</text>

  <!-- ===================== GRUPO 2: USER ===================== -->

  <!-- USER - Cohen Antes (85%) -->
  <rect x="480" y="146.5" width="55" height="213.5" fill="url(#amberBar)" rx="6" opacity="0.9"/>
  <text x="507" y="139" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">85%</text>
  <text x="507" y="378" text-anchor="middle" font-size="9" fill="#64748b">Cohen</text>
  <text x="507" y="390" text-anchor="middle" font-size="8" fill="#94a3b8">1.700/2.000</text>

  <!-- USER - Hermes Antes (92%) -->
  <rect x="545" y="129" width="55" height="231" fill="url(#redBar)" rx="6" opacity="0.9"/>
  <text x="572" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">92%</text>
  <text x="572" y="378" text-anchor="middle" font-size="9" fill="#64748b">Hermes</text>
  <text x="572" y="390" text-anchor="middle" font-size="8" fill="#94a3b8">1.858/2.000</text>

  <!-- USER - Depois (34%) linha referencia -->
  <line x1="475" y1="225" x2="610" y2="225" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="620" y="228" font-size="10" font-weight="600" fill="#059669">34%</text>
  <text x="620" y="240" font-size="8" fill="#94a3b8">limite 5.000</text>

  <!-- Separadores de grupo -->
  <line x1="295" y1="95" x2="295" y2="400" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="195" y="415" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">ANTES (limite 3.200 / 2.000)</text>
  <text x="435" y="415" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">DEPOIS (limite 10.000 / 5.000)</text>

  <!-- Sub-labels -->
  <text x="195" y="432" text-anchor="middle" font-size="10" fill="#94a3b8">memory</text>
  <text x="540" y="432" text-anchor="middle" font-size="10" fill="#94a3b8">user</text>

  <!-- Legenda -->
  <rect x="140" y="448" width="12" height="12" fill="#dc2626" rx="2"/>
  <text x="158" y="458" font-size="9" fill="#64748b">Critico (>90%)</text>
  <rect x="280" y="448" width="12" height="12" fill="#d97706" rx="2"/>
  <text x="298" y="458" font-size="9" fill="#64748b">Alerta (80-90%)</text>
  <rect x="420" y="448" width="12" height="12" fill="#059669" rx="2"/>
  <text x="438" y="458" font-size="9" fill="#64748b">Saudavel (&lt;50%)</text>
</svg>
