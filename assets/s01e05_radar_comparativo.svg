<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="620" height="500" fill="#f8fafc" rx="12"/>

  <text x="310" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Radar Comparativo</text>
  <text x="310" y="55" text-anchor="middle" font-size="12" fill="#64748b">7 dimensões de avaliação — Desktop vs CLI + WSL2</text>

  <!-- Centro: (310, 270), raio=145 -->
  <!-- 7 eixos: começando no topo, 51.43° entre cada -->
  <!-- Angulos (graus, anti-horario): 90, 38.57, -12.86, -64.29, -115.71, -167.14, 141.43 -->
  <!-- Convertendo para radianos e calculando pontos -->
  <!-- Eixo 0 (topo, 90°): (310, 270-145) = (310, 125) -->
  <!-- Eixo 1 (38.57°): (310+145*cos(51.43°*π/180), 270-145*sin(51.43°*π/180)) = (310+90.4, 270-113.3) = (400.4, 156.7) -->
  <!-- Eixo 2 (-12.86°): (310+145*cos(12.86°*π/180), 270+145*sin(12.86°*π/180)) = (310+141.4, 270+32.3) = (451.4, 302.3) -->
  <!-- Eixo 3 (-64.29°): (310+145*cos(64.29°*π/180), 270+145*sin(64.29°*π/180)) = (310+62.9, 270+130.7) = (372.9, 400.7) -->
  <!-- Eixo 4 (-115.71°): (310-62.9, 270+130.7) = (247.1, 400.7) -->
  <!-- Eixo 5 (-167.14°): (310-141.4, 270+32.3) = (168.6, 302.3) -->
  <!-- Eixo 6 (141.43°): (310-90.4, 270-113.3) = (219.6, 156.7) -->

  <!-- Grids -->
  <!-- 25% -->
  <polygon points="310,233.75 332.6,241.7 346.35,278.1 321.72,302.7 298.28,302.7 273.65,278.1 287.4,241.7" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- 50% -->
  <polygon points="310,197.5 355.2,213.3 382.7,286.1 333.45,335.4 286.55,335.4 237.3,286.1 264.8,213.3" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- 75% -->
  <polygon points="310,161.25 377.8,184.9 419.05,294.2 345.17,368 274.83,368 200.95,294.2 242.2,184.9" fill="none" stroke="#e2e8f0" stroke-width="0.7"/>
  <!-- 100% -->
  <polygon points="310,125 400.4,156.7 451.4,302.3 372.9,400.7 247.1,400.7 168.6,302.3 219.6,156.7" fill="none" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Eixos -->
  <line x1="310" y1="270" x2="310" y2="125" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="270" x2="400.4" y2="156.7" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="270" x2="451.4" y2="302.3" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="270" x2="372.9" y2="400.7" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="270" x2="247.1" y2="400.7" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="270" x2="168.6" y2="302.3" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="270" x2="219.6" y2="156.7" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Labels -->
  <text x="310" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Persistência</text>
  <text x="410" y="150" text-anchor="start" font-size="10" font-weight="600" fill="#1e293b">Memória</text>
  <text x="460" y="308" text-anchor="start" font-size="10" font-weight="600" fill="#1e293b">Inter-Agente</text>
  <text x="380" y="418" text-anchor="start" font-size="10" font-weight="600" fill="#1e293b">Skills</text>
  <text x="240" y="418" text-anchor="end" font-size="10" font-weight="600" fill="#1e293b">Segurança</text>
  <text x="160" y="308" text-anchor="end" font-size="10" font-weight="600" fill="#1e293b">Mensageria</text>
  <text x="210" y="150" text-anchor="end" font-size="10" font-weight="600" fill="#1e293b">UI / UX</text>

  <!-- DADOS CLI+WSL2 (verde): Persist=100, Mem=95, InterAg=100, Skills=90, Seg=85, Mens=90, UI=55 -->
  <!-- Escala: raio = valor/100 * 145 -->
  <!-- Persist(100): (310, 125) -->
  <!-- Mem(95): (310+137.8*0.623, 270-137.8*0.782) = (310+85.8, 270-107.7) = (395.8, 162.3) -->
  <!-- InterAg(100): (310+145, 270+0) -> (455, 270) simplified -->
  <!-- Skills(90): (310+130.5*0.434, 270+130.5*0.901) = (310+56.6, 270+117.6) = (366.6, 387.6) -->
  <!-- Seg(85): (310-123.25*0.434, 270+123.25*0.901) = (310-53.5, 270+111) = (256.5, 381) -->
  <!-- Mens(90): (310-130.5*0.974, 270+130.5*0.223) = (310-127.1, 270+29.1) = (182.9, 299.1) -->
  <!-- UI(55): (310+79.75*0.623, 270-79.75*0.782) = (310-49.7, 270-62.3) = (260.3, 207.7) -->

  <polygon points="310,125 395.8,162.3 451.4,302.3 366.6,387.6 256.5,381 182.9,299.1 260.3,207.7"
    fill="#059669" fill-opacity="0.12" stroke="#059669" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- DADOS Desktop (vermelho): Persist=25, Mem=40, InterAg=0, Skills=80, Seg=55, Mens=60, UI=90 -->
  <!-- Persist(25): (310, 270-36.25) = (310, 233.75) -->
  <!-- Mem(40): (310+58*0.623, 270-58*0.782) = (310+36.1, 270-45.4) = (346.1, 224.6) -->
  <!-- InterAg(0): (310, 270) centro -->
  <!-- Skills(80): (310+116*0.434, 270+116*0.901) = (310+50.3, 270+104.5) = (360.3, 374.5) -->
  <!-- Seg(55): (310-79.75*0.434, 270+79.75*0.901) = (310-34.6, 270+71.8) = (275.4, 341.8) -->
  <!-- Mens(60): (310-87*0.974, 270+87*0.223) = (310-84.7, 270+19.4) = (225.3, 289.4) -->
  <!-- UI(90): (310-130.5*0.623, 270-130.5*0.782) = (310-81.3, 270-102) = (228.7, 168) -->

  <polygon points="310,233.75 346.1,224.6 310,270 360.3,374.5 275.4,341.8 225.3,289.4 228.7,168"
    fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="2" stroke-linejoin="round" stroke-dasharray="6,3"/>

  <!-- Pontos CLI -->
  <circle cx="310" cy="125" r="4" fill="#059669"/>
  <circle cx="395.8" cy="162.3" r="4" fill="#059669"/>
  <circle cx="451.4" cy="302.3" r="4" fill="#059669"/>
  <circle cx="366.6" cy="387.6" r="4" fill="#059669"/>
  <circle cx="256.5" cy="381" r="4" fill="#059669"/>
  <circle cx="182.9" cy="299.1" r="4" fill="#059669"/>
  <circle cx="260.3" cy="207.7" r="4" fill="#059669"/>

  <!-- Pontos Desktop -->
  <circle cx="310" cy="233.75" r="4" fill="#dc2626"/>
  <circle cx="346.1" cy="224.6" r="4" fill="#dc2626"/>
  <circle cx="310" cy="270" r="4" fill="#dc2626"/>
  <circle cx="360.3" cy="374.5" r="4" fill="#dc2626"/>
  <circle cx="275.4" cy="341.8" r="4" fill="#dc2626"/>
  <circle cx="225.3" cy="289.4" r="4" fill="#dc2626"/>
  <circle cx="228.7" cy="168" r="4" fill="#dc2626"/>

  <!-- Legenda -->
  <rect x="150" y="438" width="320" height="50" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="170" y="452" width="18" height="10" fill="#059669" fill-opacity="0.2" stroke="#059669" stroke-width="2" rx="2"/>
  <text x="195" y="461" font-size="11" fill="#1e293b">CLI + WSL2 (nosso setup)</text>
  <rect x="170" y="470" width="18" height="10" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" rx="2"/>
  <text x="195" y="479" font-size="11" fill="#1e293b">Hermes-Desktop (WinUI 3)</text>

  <!-- Insight -->
  <rect x="370" y="444" width="90" height="38" fill="#f0fdf4" rx="6" stroke="#059669" stroke-width="1"/>
  <text x="415" y="459" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">6 de 7</text>
  <text x="415" y="473" text-anchor="middle" font-size="8" fill="#475569">vitórias CLI</text>
</svg>