<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="620" height="500" fill="#f8fafc" rx="12"/>

  <!-- Titulo -->
  <text x="310" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Comparativo Multidimensional</text>
  <text x="310" y="55" text-anchor="middle" font-size="12" fill="#64748b">Whisper vs Nemotron 3 Nano Omni (5 dimensoes)</text>

  <!-- Centro do radar: (310, 265), raio maximo: 150 -->
  <!-- 5 eixos: Precisao Literal, Velocidade, Fidelidade a Acronimos, Resistencia a Alucinacoes, Compreensao Semantica -->
  <!-- Angulos: 90, 162, 234, 306, 378(=18) graus (comecando no topo, sentido horario) -->

  <!-- Camadas do grid (20%, 40%, 60%, 80%, 100%) -->
  <!-- Raio=30 -->
  <polygon points="310,235 338.5,244.3 327.2,269.2 292.8,269.2 281.5,244.3" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- Raio=60 -->
  <polygon points="310,205 367,223.5 344.3,273.5 275.7,273.5 253,223.5" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- Raio=90 -->
  <polygon points="310,175 395.5,202.8 361.5,277.8 258.5,277.8 224.5,202.8" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- Raio=120 -->
  <polygon points="310,145 424,182 378.7,282 241.3,282 196,182" fill="none" stroke="#e2e8f0" stroke-width="0.7"/>
  <!-- Raio=150 (100%) -->
  <polygon points="310,115 452.5,161.3 395.9,286.4 224.1,286.4 167.5,161.3" fill="none" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Linhas dos eixos -->
  <line x1="310" y1="265" x2="310" y2="115" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="265" x2="452.5" y2="161.3" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="265" x2="395.9" y2="286.4" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="265" x2="224.1" y2="286.4" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="265" x2="167.5" y2="161.3" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Labels dos eixos -->
  <text x="310" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Precisao Literal</text>
  <text x="462" y="158" text-anchor="start" font-size="11" font-weight="600" fill="#1e293b">Velocidade</text>
  <text x="405" y="304" text-anchor="start" font-size="11" font-weight="600" fill="#1e293b">Fidelidade a</text>
  <text x="405" y="317" text-anchor="start" font-size="11" font-weight="600" fill="#1e293b">Acronimos</text>
  <text x="215" y="304" text-anchor="end" font-size="11" font-weight="600" fill="#1e293b">Resistencia a</text>
  <text x="215" y="317" text-anchor="end" font-size="11" font-weight="600" fill="#1e293b">Alucinacoes</text>
  <text x="158" y="158" text-anchor="end" font-size="11" font-weight="600" fill="#1e293b">Compreensao</text>
  <text x="158" y="171" text-anchor="end" font-size="11" font-weight="600" fill="#1e293b">Semantica</text>

  <!-- Labels percentuais nos eixos -->
  <text x="315" y="142" font-size="8" fill="#94a3b8">80%</text>
  <text x="315" y="172" font-size="8" fill="#94a3b8">60%</text>
  <text x="315" y="202" font-size="8" fill="#94a3b8">40%</text>
  <text x="315" y="232" font-size="8" fill="#94a3b8">20%</text>

  <!-- DADOS WHISPER (verde): Precisao=95%, Velocidade=90%, Acronimos=95%, Anti-Aluc=95%, Semantica=15% -->
  <!-- Escala: raio = valor * 1.5 -->
  <!-- Precisao(95%): r=142.5 -> (310, 265-142.5) = (310, 122.5) -->
  <!-- Velocidade(90%): r=135 -> (310+135*sin72, 265-135*cos72) = (310+128.4, 265-41.7) = (438.4, 223.3) -->
  <!-- Acronimos(95%): r=142.5 -> (310+142.5*sin144, 265-142.5*cos144) = (310+83.8, 265+115.2) = (393.8, 380.2) -->
  <!-- Anti-Aluc(95%): r=142.5 -> (310-142.5*sin144, 265+142.5*cos144) = (310-83.8, 265+115.2) = (226.2, 380.2) -->
  <!-- Semantica(15%): r=22.5 -> (310-22.5*sin72, 265-22.5*cos72) = (310-21.4, 265-6.9) = (288.6, 258.1) -->

  <polygon points="310,122.5 438.4,223.3 393.8,380.2 226.2,380.2 288.6,258.1"
    fill="#059669" fill-opacity="0.15" stroke="#059669" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Dados multimodal thinking=OFF (laranja): Precisao=60%, Velocidade=35%, Acronimos=30%, Anti-Aluc=40%, Semantica=75% -->
  <!-- Precisao(60%): r=90 -> (310, 175) -->
  <!-- Velocidade(35%): r=52.5 -> (310+52.5*sin72, 265-52.5*cos72) = (310+49.9, 265-16.2) = (359.9, 248.8) -->
  <!-- Acronimos(30%): r=45 -> (310+45*sin144, 265+45*cos144) = (310+26.5, 265+36.4) = (336.5, 301.4) -->
  <!-- Anti-Aluc(40%): r=60 -> (310-60*sin144, 265+60*cos144) = (310-35.3, 265+48.5) = (274.7, 313.5) -->
  <!-- Semantica(75%): r=112.5 -> (310-112.5*sin72, 265-112.5*cos72) = (310-106.9, 265-34.7) = (203.1, 230.3) -->

  <polygon points="310,175 359.9,248.8 336.5,301.4 274.7,313.5 203.1,230.3"
    fill="#ea580c" fill-opacity="0.12" stroke="#ea580c" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="6,3"/>

  <!-- Dados multimodal thinking=ON (vermelho): Precisao=40%, Velocidade=35%, Acronimos=20%, Anti-Aluc=20%, Semantica=85% -->
  <!-- Precisao(40%): r=60 -> (310, 205) -->
  <!-- Velocidade(35%): r=52.5 -> (359.9, 248.8) (mesmo que OFF) -->
  <!-- Acronimos(20%): r=30 -> (310+30*sin144, 265+30*cos144) = (310+17.6, 265+24.3) = (327.6, 289.3) -->
  <!-- Anti-Aluc(20%): r=30 -> (310-30*sin144, 265+30*cos144) = (310-17.6, 265+24.3) = (292.4, 289.3) -->
  <!-- Semantica(85%): r=127.5 -> (310-127.5*sin72, 265-127.5*cos72) = (310-121.2, 265-39.4) = (188.8, 225.6) -->

  <polygon points="310,205 359.9,248.8 327.6,289.3 292.4,289.3 188.8,225.6"
    fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="2" stroke-linejoin="round" stroke-dasharray="3,3"/>

  <!-- Pontos nos vertices - Whisper -->
  <circle cx="310" cy="122.5" r="4" fill="#059669"/>
  <circle cx="438.4" cy="223.3" r="4" fill="#059669"/>
  <circle cx="393.8" cy="380.2" r="4" fill="#059669"/>
  <circle cx="226.2" cy="380.2" r="4" fill="#059669"/>
  <circle cx="288.6" cy="258.1" r="4" fill="#059669"/>

  <!-- Pontos nos vertices - Omni OFF -->
  <circle cx="310" cy="175" r="4" fill="#ea580c"/>
  <circle cx="359.9" cy="248.8" r="4" fill="#ea580c"/>
  <circle cx="336.5" cy="301.4" r="4" fill="#ea580c"/>
  <circle cx="274.7" cy="313.5" r="4" fill="#ea580c"/>
  <circle cx="203.1" cy="230.3" r="4" fill="#ea580c"/>

  <!-- Pontos nos vertices - Omni ON -->
  <circle cx="310" cy="205" r="4" fill="#dc2626"/>
  <circle cx="359.9" cy="248.8" r="4" fill="#dc2626"/>
  <circle cx="327.6" cy="289.3" r="4" fill="#dc2626"/>
  <circle cx="292.4" cy="289.3" r="4" fill="#dc2626"/>
  <circle cx="188.8" cy="225.6" r="4" fill="#dc2626"/>

  <!-- Legenda -->
  <rect x="140" y="420" width="340" height="70" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>

  <rect x="160" y="435" width="18" height="10" fill="#059669" fill-opacity="0.3" stroke="#059669" stroke-width="2" rx="2"/>
  <text x="185" y="444" font-size="11" fill="#1e293b">Whisper (STT Dedicado)</text>

  <rect x="160" y="455" width="18" height="10" fill="#ea580c" fill-opacity="0.2" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3" rx="2"/>
  <text x="185" y="464" font-size="11" fill="#1e293b">Omni thinking=OFF</text>

  <rect x="160" y="475" width="18" height="10" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626" stroke-width="2" stroke-dasharray="3,3" rx="2"/>
  <text x="185" y="484" font-size="11" fill="#1e293b">Omni thinking=ON</text>

  <!-- Insight box -->
  <rect x="360" y="432" width="108" height="45" fill="#f0fdf4" rx="6" stroke="#059669" stroke-width="1"/>
  <text x="414" y="449" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">INSIGHT</text>
  <text x="414" y="462" text-anchor="middle" font-size="8" fill="#475569">Whisper domina em</text>
  <text x="414" y="472" text-anchor="middle" font-size="8" fill="#475569">4 de 5 dimensoes</text>
</svg>