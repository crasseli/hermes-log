<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 460" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#64748b"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8,0 0,3 8,6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Fundo -->
  <rect width="650" height="460" fill="#f8fafc" rx="12"/>

  <!-- Titulo -->
  <text x="325" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Transcricao Literal vs Compreensao Semantica</text>
  <text x="325" y="55" text-anchor="middle" font-size="12" fill="#64748b">Dois paradigmas fundamentalmente diferentes de processamento de audio</text>

  <!-- PAINEL ESQUERDO - LITERAL -->
  <rect x="30" y="75" width="270" height="310" fill="url(#greenGrad)" rx="12" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Cabecalho Literal -->
  <rect x="30" y="75" width="270" height="50" fill="#059669" rx="12"/>
  <rect x="30" y="100" width="270" height="25" fill="#059669"/>
  <text x="165" y="105" text-anchor="middle" font-size="16" font-weight="700" fill="white">LITERAL</text>
  <text x="165" y="120" text-anchor="middle" font-size="9" fill="#d1fae5">Fonema -> Grafema</text>

  <!-- Icone microfone -->
  <circle cx="165" cy="160" r="22" fill="white" fill-opacity="0.7"/>
  <text x="165" y="167" text-anchor="middle" font-size="22">🎙</text>
  <text x="165" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Whisper (ASR Dedicado)</text>

  <!-- Caracteristicas -->
  <rect x="50" y="210" width="230" height="28" fill="white" fill-opacity="0.6" rx="6"/>
  <text x="60" y="228" font-size="10" fill="#065f46">✅ Mapeia sinal acustico para texto</text>

  <rect x="50" y="244" width="230" height="28" fill="white" fill-opacity="0.6" rx="6"/>
  <text x="60" y="262" font-size="10" fill="#065f46">✅ Preserva acronimos: "DIA" = DIA</text>

  <rect x="50" y="278" width="230" height="28" fill="white" fill-opacity="0.6" rx="6"/>
  <text x="60" y="296" font-size="10" fill="#065f46">✅ Nao inventa palavras</text>

  <rect x="50" y="312" width="230" height="28" fill="white" fill-opacity="0.6" rx="6"/>
  <text x="60" y="330" font-size="10" fill="#065f46">✅ Precisao 95%+ palavra-por-palavra</text>

  <!-- Caso de uso -->
  <rect x="50" y="350" width="230" height="24" fill="#059669" rx="6"/>
  <text x="165" y="366" text-anchor="middle" font-size="9" font-weight="600" fill="white">CASO DE USO: Atas, legendas, comandos de voz</text>

  <!-- PAINEL DIREITO - SEMANTICO -->
  <rect x="350" y="75" width="270" height="310" fill="url(#redGrad)" rx="12" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Cabecalho Semantico -->
  <rect x="350" y="75" width="270" height="50" fill="#dc2626" rx="12"/>
  <rect x="350" y="100" width="270" height="25" fill="#dc2626"/>
  <text x="485" y="105" text-anchor="middle" font-size="16" font-weight="700" fill="white">SEMANTICO</text>
  <text x="485" y="120" text-anchor="middle" font-size="9" fill="#fecaca">Audio -> Significado -> Texto</text>

  <!-- Icone cerebro -->
  <circle cx="485" cy="160" r="22" fill="white" fill-opacity="0.7"/>
  <text x="485" y="167" text-anchor="middle" font-size="22">🧠</text>
  <text x="485" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">Nemotron Omni (Multimodal)</text>

  <!-- Caracteristicas -->
  <rect x="370" y="210" width="230" height="28" fill="white" fill-opacity="0.6" rx="6"/>
  <text x="380" y="228" font-size="10" fill="#7f1d1d">⚠️ Constroi representacao semantica</text>

  <rect x="370" y="244" width="230" height="28" fill="white" fill-opacity="0.6" rx="6"/>
  <text x="380" y="262" font-size="10" fill="#7f1d1d">❌ Interpreta acronimos: "DIA" = "de IA"</text>

  <rect x="370" y="278" width="230" height="28" fill="white" fill-opacity="0.6" rx="6"/>
  <text x="380" y="296" font-size="10" fill="#7f1d1d">❌ Alucina palavras: "Finto", "video"</text>

  <rect x="370" y="312" width="230" height="28" fill="white" fill-opacity="0.6" rx="6"/>
  <text x="380" y="330" font-size="10" fill="#7f1d1d">⚠️ Precisao ~40-60% palavra-por-palavra</text>

  <!-- Caso de uso -->
  <rect x="370" y="350" width="230" height="24" fill="#dc2626" rx="6"/>
  <text x="485" y="366" text-anchor="middle" font-size="9" font-weight="600" fill="white">CASO DE USO: Resumo, intencao, analise de sentimento</text>

  <!-- SETAS CENTRAIS -->
  <line x1="300" y1="180" x2="345" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <line x1="345" y1="200" x2="300" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowLeft)"/>
  <text x="322" y="173" text-anchor="middle" font-size="8" fill="#64748b">nao</text>
  <text x="322" y="174" text-anchor="middle" font-size="8" fill="#64748b"> </text>
  <text x="322" y="213" text-anchor="middle" font-size="8" fill="#64748b">nao</text>

  <!-- Texto central explicativo -->
  <rect x="290" y="240" width="70" height="40" fill="#f1f5f9" rx="6" stroke="#cbd5e1" stroke-width="1"/>
  <text x="325" y="255" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">NUNCA</text>
  <text x="325" y="267" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">substituir</text>
  <text x="325" y="279" text-anchor="middle" font-size="8" fill="#475569">um pelo outro</text>

  <!-- Veredito -->
  <rect x="140" y="405" width="370" height="42" fill="#f0fdf4" rx="10" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="325" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">VEREDITO: Arquitetura hibrida</text>
  <text x="325" y="438" text-anchor="middle" font-size="10" fill="#475569">Whisper para transcricao literal + Multimodal para compreensao semantica</text>
</svg>