<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="critGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="okGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/><stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="limitLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0"/><stop offset="15%" stop-color="#ef4444"/><stop offset="85%" stop-color="#ef4444"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/></filter>
    <filter id="shSm"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="740" height="500" fill="#f8fafc" rx="14"/>

  <!-- Cabecalho -->
  <rect x="30" y="18" width="680" height="52" fill="white" rx="10" filter="url(#sh)"/>
  <text x="370" y="42" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Ocupacao de Memoria Persistente</text>
  <text x="370" y="60" text-anchor="middle" font-size="11" fill="#94a3b8">Antes (limite 3.200 / 2.000) vs Depois (limite 10.000 / 5.000)</text>

  <!-- PAINEL ANTES -->
  <rect x="40" y="85" width="320" height="345" fill="white" rx="10" filter="url(#sh)"/>
  <rect x="40" y="85" width="320" height="32" fill="#fef2f2" rx="10"/>
  <rect x="40" y="105" width="320" height="12" fill="#fef2f2"/>
  <circle cx="60" cy="101" r="6" fill="#dc2626"/>
  <text x="75" y="105" font-size="12" font-weight="700" fill="#991b1b">ANTES — Limite 3.200 / 2.000</text>

  <!-- Eixo Y -->
  <text x="72" y="145" text-anchor="end" font-size="9" fill="#94a3b8">100%</text>
  <text x="72" y="200" text-anchor="end" font-size="9" fill="#94a3b8">75%</text>
  <text x="72" y="255" text-anchor="end" font-size="9" fill="#94a3b8">50%</text>
  <text x="72" y="310" text-anchor="end" font-size="9" fill="#94a3b8">25%</text>
  <text x="72" y="365" text-anchor="end" font-size="9" fill="#94a3b8">0%</text>

  <!-- Gridlines -->
  <line x1="78" y1="140" x2="340" y2="140" stroke="#f1f5f9" stroke-width="0.5"/>
  <line x1="78" y1="195" x2="340" y2="195" stroke="#f1f5f9" stroke-width="0.5"/>
  <line x1="78" y1="250" x2="340" y2="250" stroke="#f1f5f9" stroke-width="0.5"/>
  <line x1="78" y1="305" x2="340" y2="305" stroke="#f1f5f9" stroke-width="0.5"/>
  <line x1="78" y1="360" x2="340" y2="360" stroke="#e2e8f0" stroke-width="0.8"/>

  <!-- Barra 1: Cohen memory 99% -->
  <rect x="95" y="141" width="50" height="219" fill="url(#critGrad)" rx="5"/>
  <text x="120" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">99%</text>
  <text x="120" y="380" text-anchor="middle" font-size="9" fill="#64748b">Cohen</text>
  <text x="120" y="392" text-anchor="middle" font-size="8" fill="#94a3b8">3.144/3.200</text>
  <rect x="88" y="395" width="64" height="14" fill="#fef2f2" rx="3"/>
  <text x="120" y="405" text-anchor="middle" font-size="7" font-weight="600" fill="#b91c1c">CRITICO</text>

  <!-- Barra 2: Hermes memory 84% -->
  <rect x="160" y="174" width="50" height="186" fill="url(#warnGrad)" rx="5"/>
  <text x="185" y="167" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">84%</text>
  <text x="185" y="380" text-anchor="middle" font-size="9" fill="#64748b">Hermes</text>
  <text x="185" y="392" text-anchor="middle" font-size="8" fill="#94a3b8">2.716/3.200</text>
  <rect x="153" y="395" width="64" height="14" fill="#fefce8" rx="3"/>
  <text x="185" y="405" text-anchor="middle" font-size="7" font-weight="600" fill="#92400e">ALERTA</text>

  <!-- Barra 3: Cohen user 85% -->
  <rect x="225" y="172" width="50" height="188" fill="url(#warnGrad)" rx="5"/>
  <text x="250" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">85%</text>
  <text x="250" y="380" text-anchor="middle" font-size="9" fill="#64748b">Cohen</text>
  <text x="250" y="392" text-anchor="middle" font-size="8" fill="#94a3b8">1.700/2.000</text>
  <rect x="218" y="395" width="64" height="14" fill="#fefce8" rx="3"/>
  <text x="250" y="405" text-anchor="middle" font-size="7" font-weight="600" fill="#92400e">ALERTA</text>

  <!-- Barra 4: Hermes user 92% -->
  <rect x="290" y="157" width="50" height="203" fill="url(#critGrad)" rx="5"/>
  <text x="315" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">92%</text>
  <text x="315" y="380" text-anchor="middle" font-size="9" fill="#64748b">Hermes</text>
  <text x="315" y="392" text-anchor="middle" font-size="8" fill="#94a3b8">1.858/2.000</text>
  <rect x="283" y="395" width="64" height="14" fill="#fef2f2" rx="3"/>
  <text x="315" y="405" text-anchor="middle" font-size="7" font-weight="600" fill="#b91c1c">CRITICO</text>

  <!-- Labels grupo -->
  <text x="152" y="420" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">memory</text>
  <text x="282" y="420" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">user_profile</text>

  <!-- PAINEL DEPOIS -->
  <rect x="380" y="85" width="320" height="345" fill="white" rx="10" filter="url(#sh)"/>
  <rect x="380" y="85" width="320" height="32" fill="#ecfdf5" rx="10"/>
  <rect x="380" y="105" width="320" height="12" fill="#ecfdf5"/>
  <circle cx="400" cy="101" r="6" fill="#059669"/>
  <text x="415" y="105" font-size="12" font-weight="700" fill="#047857">DEPOIS — Limite 10.000 / 5.000</text>

  <!-- Eixo Y -->
  <text x="412" y="145" text-anchor="end" font-size="9" fill="#94a3b8">100%</text>
  <text x="412" y="200" text-anchor="end" font-size="9" fill="#94a3b8">75%</text>
  <text x="412" y="255" text-anchor="end" font-size="9" fill="#94a3b8">50%</text>
  <text x="412" y="310" text-anchor="end" font-size="9" fill="#94a3b8">25%</text>
  <text x="412" y="365" text-anchor="end" font-size="9" fill="#94a3b8">0%</text>

  <!-- Gridlines -->
  <line x1="418" y1="140" x2="680" y2="140" stroke="#f1f5f9" stroke-width="0.5"/>
  <line x1="418" y1="195" x2="680" y2="195" stroke="#f1f5f9" stroke-width="0.5"/>
  <line x1="418" y1="250" x2="680" y2="250" stroke="#f1f5f9" stroke-width="0.5"/>
  <line x1="418" y1="305" x2="680" y2="305" stroke="#f1f5f9" stroke-width="0.5"/>
  <line x1="418" y1="360" x2="680" y2="360" stroke="#e2e8f0" stroke-width="0.8"/>

  <!-- Barra 1: Cohen memory 31% -->
  <rect x="435" y="292" width="50" height="68" fill="url(#okGrad)" rx="5"/>
  <text x="460" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">31%</text>
  <text x="460" y="380" text-anchor="middle" font-size="9" fill="#64748b">Cohen</text>
  <text x="460" y="392" text-anchor="middle" font-size="8" fill="#94a3b8">3.144/10.000</text>
  <rect x="428" y="395" width="64" height="14" fill="#ecfdf5" rx="3"/>
  <text x="460" y="405" text-anchor="middle" font-size="7" font-weight="600" fill="#047857">SAUDAVEL</text>

  <!-- Barra 2: Hermes memory 27% -->
  <rect x="500" y="300" width="50" height="60" fill="url(#okGrad)" rx="5"/>
  <text x="525" y="293" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">27%</text>
  <text x="525" y="380" text-anchor="middle" font-size="9" fill="#64748b">Hermes</text>
  <text x="525" y="392" text-anchor="middle" font-size="8" fill="#94a3b8">2.716/10.000</text>
  <rect x="493" y="395" width="64" height="14" fill="#ecfdf5" rx="3"/>
  <text x="525" y="405" text-anchor="middle" font-size="7" font-weight="600" fill="#047857">SAUDAVEL</text>

  <!-- Barra 3: Cohen user 34% -->
  <rect x="565" y="285" width="50" height="75" fill="url(#okGrad)" rx="5"/>
  <text x="590" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">34%</text>
  <text x="590" y="380" text-anchor="middle" font-size="9" fill="#64748b">Cohen</text>
  <text x="590" y="392" text-anchor="middle" font-size="8" fill="#94a3b8">1.700/5.000</text>
  <rect x="558" y="395" width="64" height="14" fill="#ecfdf5" rx="3"/>
  <text x="590" y="405" text-anchor="middle" font-size="7" font-weight="600" fill="#047857">SAUDAVEL</text>

  <!-- Barra 4: Hermes user 37% -->
  <rect x="630" y="279" width="50" height="81" fill="url(#okGrad)" rx="5"/>
  <text x="655" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">37%</text>
  <text x="655" y="380" text-anchor="middle" font-size="9" fill="#64748b">Hermes</text>
  <text x="655" y="392" text-anchor="middle" font-size="8" fill="#94a3b8">1.858/5.000</text>
  <rect x="623" y="395" width="64" height="14" fill="#ecfdf5" rx="3"/>
  <text x="655" y="405" text-anchor="middle" font-size="7" font-weight="600" fill="#047857">SAUDAVEL</text>

  <!-- Labels grupo -->
  <text x="492" y="420" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">memory</text>
  <text x="622" y="420" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">user_profile</text>

  <!-- Seta central -->
  <rect x="347" y="225" width="46" height="70" fill="white" rx="8" filter="url(#shSm)"/>
  <text x="370" y="253" text-anchor="middle" font-size="16" font-weight="700" fill="#059669">&#x2192;</text>
  <text x="370" y="272" text-anchor="middle" font-size="7" fill="#64748b">3,1x</text>
  <text x="370" y="282" text-anchor="middle" font-size="7" fill="#64748b">2,5x</text>

  <!-- Insight box -->
  <rect x="40" y="440" width="660" height="46" fill="#f0fdf4" rx="8" stroke="#059669" stroke-width="1"/>
  <text x="370" y="458" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">Resultado: ocupacao media caiu de 90% para 32% — folga de 68 pontos percentuais</text>
  <text x="370" y="474" text-anchor="middle" font-size="9" fill="#059669">Contexto de tarefas ativas agora pode ser registrado sem forcar substituicao de entradas existentes</text>
</svg>
