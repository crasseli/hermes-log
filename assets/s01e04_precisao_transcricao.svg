<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="260" fill="#ffffff" rx="8"/>
  
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Precisão de Transcrição: Whisper vs Modelo Multimodal</text>
  
  <!-- Eixo -->
  <line x1="160" y1="50" x2="160" y2="200" stroke="#bdc3c7" stroke-width="1"/>
  <text x="155" y="205" text-anchor="end" font-size="10" fill="#7f8c8d">0%</text>
  <text x="155" y="165" text-anchor="end" font-size="10" fill="#7f8c8d">25%</text>
  <text x="155" y="125" text-anchor="end" font-size="10" fill="#7f8c8d">50%</text>
  <text x="155" y="85" text-anchor="end" font-size="10" fill="#7f8c8d">75%</text>
  <text x="155" y="55" text-anchor="end" font-size="10" fill="#7f8c8d">100%</text>
  
  <!-- Grade -->
  <line x1="160" y1="160" x2="720" y2="160" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4"/>
  <line x1="160" y1="120" x2="720" y2="120" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4"/>
  <line x1="160" y1="80" x2="720" y2="80" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Whisper: 95% -> 95% de 150px = 142.5px -->
  <text x="310" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#2c3e50">Whisper (STT)</text>
  <rect x="200" y="62" width="220" height="36" fill="#2ECC71" rx="5" opacity="0.85"/>
  <text x="430" y="85" font-size="14" font-weight="bold" fill="#2ECC71">95%+</text>
  <text x="310" y="245" text-anchor="middle" font-size="10" fill="#7f8c8d">1 erro em 1 letra</text>
  
  <!-- Omni thinking=OFF: 60% -> 60% de 150px = 90px -->
  <text x="550" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#2c3e50">Multimodal (thinking=OFF)</text>
  <rect x="460" y="110" width="90" height="36" fill="#E74C3C" rx="5" opacity="0.85"/>
  <text x="560" y="133" font-size="14" font-weight="bold" fill="#E74C3C">~60%</text>
  <text x="550" y="245" text-anchor="middle" font-size="10" fill="#7f8c8d">Parafraseamento + alucinações</text>
  
  <!-- Omni thinking=ON: ~40% -> 40% de 150px = 60px -->
  <text x="680" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#2c3e50">Multimodal (thinking=ON)</text>
  <rect x="640" y="140" width="60" height="36" fill="#C0392B" rx="5" opacity="0.85"/>
  <text x="710" y="163" font-size="14" font-weight="bold" fill="#C0392B">~40%</text>
  <text x="680" y="245" text-anchor="middle" font-size="10" fill="#7f8c8d">Interpretação semântica dominante</text>
  
  <text x="400" y="258" text-anchor="middle" font-size="10" fill="#95a5a6">Precisão medida por transcrição palavra-por-palavra em áudio de ~34s com termos técnicos</text>
</svg>