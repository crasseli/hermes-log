<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="greenFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="redFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="700" height="440" fill="#f8fafc" rx="12"/>

  <text x="350" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Cobertura Funcional</text>
  <text x="350" y="55" text-anchor="middle" font-size="12" fill="#64748b">Hermes-Desktop vs Setup CLI + WSL2 — 10 critérios de avaliação</text>

  <!-- Criterios e barras: y=75, spacing=36, max width=350, start x=220 -->
  <!-- Escala: 0-100%, width = porcentagem * 3.5 -->

  <!-- 1. Persistência / Uptime: Desktop 25% | CLI 100% -->
  <text x="210" y="87" text-anchor="end" font-size="11" font-weight="500" fill="#1e293b">Persistência / Uptime</text>
  <rect x="220" y="75" width="87" height="16" fill="url(#redFill)" rx="4" filter="url(#shadow)"/>
  <text x="312" y="87" font-size="9" fill="#dc2626" font-weight="600">25%</text>
  <rect x="220" y="95" width="350" height="16" fill="url(#greenFill)" rx="4" filter="url(#shadow)"/>
  <text x="575" y="107" font-size="9" fill="#059669" font-weight="600">100%</text>

  <!-- 2. Memória e Recall: Desktop 40% | CLI 95% -->
  <text x="210" y="127" text-anchor="end" font-size="11" font-weight="500" fill="#1e293b">Memória e Recall</text>
  <rect x="220" y="115" width="140" height="16" fill="url(#redFill)" rx="4" filter="url(#shadow)"/>
  <text x="365" y="127" font-size="9" fill="#dc2626" font-weight="600">40%</text>
  <rect x="220" y="135" width="332" height="16" fill="url(#greenFill)" rx="4" filter="url(#shadow)"/>
  <text x="557" y="147" font-size="9" fill="#059669" font-weight="600">95%</text>

  <!-- 3. Inter-agente: Desktop 0% | CLI 100% -->
  <text x="210" y="167" text-anchor="end" font-size="11" font-weight="500" fill="#1e293b">Comunicação Inter-Agente</text>
  <rect x="220" y="155" width="5" height="16" fill="#94a3b8" rx="3"/>
  <text x="232" y="167" font-size="9" fill="#94a3b8" font-weight="600">0%</text>
  <rect x="220" y="175" width="350" height="16" fill="url(#greenFill)" rx="4" filter="url(#shadow)"/>
  <text x="575" y="187" font-size="9" fill="#059669" font-weight="600">100%</text>

  <!-- 4. Skills: Desktop 80% | CLI 90% -->
  <text x="210" y="207" text-anchor="end" font-size="11" font-weight="500" fill="#1e293b">Ecossistema de Skills</text>
  <rect x="220" y="195" width="280" height="16" fill="url(#redFill)" rx="4" filter="url(#shadow)"/>
  <text x="505" y="207" font-size="9" fill="#dc2626" font-weight="600">80%</text>
  <rect x="220" y="215" width="315" height="16" fill="url(#greenFill)" rx="4" filter="url(#shadow)"/>
  <text x="540" y="227" font-size="9" fill="#059669" font-weight="600">90%</text>

  <!-- 5. Mensageria: Desktop 60% | CLI 90% -->
  <text x="210" y="247" text-anchor="end" font-size="11" font-weight="500" fill="#1e293b">Mensageria</text>
  <rect x="220" y="235" width="210" height="16" fill="url(#redFill)" rx="4" filter="url(#shadow)"/>
  <text x="435" y="247" font-size="9" fill="#dc2626" font-weight="600">60%</text>
  <rect x="220" y="255" width="315" height="16" fill="url(#greenFill)" rx="4" filter="url(#shadow)"/>
  <text x="540" y="267" font-size="9" fill="#059669" font-weight="600">90%</text>

  <!-- 6. Segurança: Desktop 55% | CLI 85% -->
  <text x="210" y="287" text-anchor="end" font-size="11" font-weight="500" fill="#1e293b">Segurança / Isolamento</text>
  <rect x="220" y="275" width="192" height="16" fill="url(#redFill)" rx="4" filter="url(#shadow)"/>
  <text x="417" y="287" font-size="9" fill="#dc2626" font-weight="600">55%</text>
  <rect x="220" y="295" width="297" height="16" fill="url(#greenFill)" rx="4" filter="url(#shadow)"/>
  <text x="522" y="307" font-size="9" fill="#059669" font-weight="600">85%</text>

  <!-- 7. Cron/Agendamento: Desktop 15% | CLI 95% -->
  <text x="210" y="327" text-anchor="end" font-size="11" font-weight="500" fill="#1e293b">Cron / Agendamento</text>
  <rect x="220" y="315" width="52" height="16" fill="url(#redFill)" rx="4" filter="url(#shadow)"/>
  <text x="277" y="327" font-size="9" fill="#dc2626" font-weight="600">15%</text>
  <rect x="220" y="335" width="332" height="16" fill="url(#greenFill)" rx="4" filter="url(#shadow)"/>
  <text x="557" y="347" font-size="9" fill="#059669" font-weight="600">95%</text>

  <!-- 8. UI/UX: Desktop 90% | CLI 55% -->
  <text x="210" y="367" text-anchor="end" font-size="11" font-weight="500" fill="#1e293b">Interface / UX</text>
  <rect x="220" y="355" width="315" height="16" fill="url(#redFill)" rx="4" filter="url(#shadow)"/>
  <text x="540" y="367" font-size="9" fill="#dc2626" font-weight="600">90%</text>
  <rect x="220" y="375" width="192" height="16" fill="url(#greenFill)" rx="4" filter="url(#shadow)"/>
  <text x="417" y="387" font-size="9" fill="#059669" font-weight="600">55%</text>

  <!-- Legenda -->
  <rect x="200" y="410" width="14" height="10" fill="url(#redFill)" rx="3"/>
  <text x="220" y="419" font-size="10" fill="#475569">Hermes-Desktop (WinUI 3)</text>
  <rect x="400" y="410" width="14" height="10" fill="url(#greenFill)" rx="3"/>
  <text x="420" y="419" font-size="10" fill="#475569">Setup CLI + WSL2 (nosso)</text>
</svg>