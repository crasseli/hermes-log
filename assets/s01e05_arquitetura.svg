<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="700" height="480" fill="#f8fafc" rx="12"/>

  <text x="350" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Arquitetura: Setup Atual vs Hermes-Desktop</text>
  <text x="350" y="55" text-anchor="middle" font-size="12" fill="#64748b">Duas abordagens fundamentalmente diferentes para a mesma base</text>

  <!-- PAINEL ESQUERDO - DESKTOP -->
  <rect x="30" y="75" width="290" height="350" fill="url(#redGrad)" rx="12" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="75" width="290" height="48" fill="#dc2626" rx="12"/>
  <rect x="30" y="99" width="290" height="24" fill="#dc2626"/>
  <text x="175" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="white">HERMES-DESKTOP</text>
  <text x="175" y="118" text-anchor="middle" font-size="9" fill="#fecaca">WinUI 3 + .NET 10 — Processo em foreground</text>

  <!-- Camadas Desktop -->
  <rect x="50" y="140" width="250" height="34" fill="white" fill-opacity="0.7" rx="6"/>
  <text x="175" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">UI WinUI 3 (8 páginas)</text>
  <text x="175" y="168" text-anchor="middle" font-size="8" fill="#991b1b">Dashboard, Chat, Agent, Skills, Memory...</text>

  <rect x="50" y="182" width="250" height="34" fill="white" fill-opacity="0.7" rx="6"/>
  <text x="175" y="197" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">Runtime C# In-Process</text>
  <text x="175" y="210" text-anchor="middle" font-size="8" fill="#991b1b">Agente + ferramentas em processo único</text>

  <rect x="50" y="224" width="250" height="34" fill="white" fill-opacity="0.7" rx="6"/>
  <text x="175" y="239" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">Soul System + 94 Skills</text>
  <text x="175" y="252" text-anchor="middle" font-size="8" fill="#991b1b">Personalidade persistente, multi-profile</text>

  <rect x="50" y="266" width="250" height="34" fill="white" fill-opacity="0.7" rx="6"/>
  <text x="175" y="281" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">Adaptadores C# (Telegram/Discord)</text>
  <text x="175" y="294" text-anchor="middle" font-size="8" fill="#991b1b">Sem gateway, sem Python CLI</text>

  <!-- Limitacoes Desktop -->
  <rect x="50" y="315" width="250" height="60" fill="#fef2f2" rx="6" stroke="#fca5a5" stroke-width="1"/>
  <text x="60" y="331" font-size="9" font-weight="600" fill="#991b1b">LIMITAÇÕES:</text>
  <text x="60" y="344" font-size="8" fill="#991b1b">❌ Sem systemd — morre ao fechar</text>
  <text x="60" y="355" font-size="8" fill="#991b1b">❌ Sem inter-agente</text>
  <text x="60" y="366" font-size="8" fill="#991b1b">❌ Sem busca vetorial / vault</text>

  <!-- Sozinho -->
  <rect x="50" y="388" width="250" height="24" fill="#dc2626" rx="6"/>
  <text x="175" y="404" text-anchor="middle" font-size="9" font-weight="600" fill="white">AGENTE ÚNICO — SEM PERSISTÊNCIA</text>

  <!-- PAINEL DIREITO - CLI -->
  <rect x="380" y="75" width="290" height="350" fill="url(#greenGrad)" rx="12" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="380" y="75" width="290" height="48" fill="#059669" rx="12"/>
  <rect x="380" y="99" width="290" height="24" fill="#059669"/>
  <text x="525" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="white">CLI + WSL2 + SYSTEMD</text>
  <text x="525" y="118" text-anchor="middle" font-size="9" fill="#d1fae5">Nosso setup de produção — 24/7</text>

  <!-- Camadas CLI -->
  <rect x="400" y="140" width="250" height="34" fill="white" fill-opacity="0.7" rx="6"/>
  <text x="525" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Mensageria (Telegram/Discord/Slack/Signal)</text>
  <text x="525" y="168" text-anchor="middle" font-size="8" fill="#047857">Gateway persistente — acesso remoto</text>

  <rect x="400" y="182" width="250" height="34" fill="white" fill-opacity="0.7" rx="6"/>
  <text x="525" y="197" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Hermes Agent CLI (Python)</text>
  <text x="525" y="210" text-anchor="middle" font-size="8" fill="#047857">Runtime + 164+ skills + MCP + cron</text>

  <rect x="400" y="224" width="250" height="34" fill="white" fill-opacity="0.7" rx="6"/>
  <text x="525" y="239" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Memória: fact_store + Obsidian Vault</text>
  <text x="525" y="252" text-anchor="middle" font-size="8" fill="#047857">Busca híbrida FTS5 + vetorial (nv-embed)</text>

  <rect x="400" y="266" width="250" height="34" fill="white" fill-opacity="0.7" rx="6"/>
  <text x="525" y="281" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Comunicação Inter-Agente (SSH)</text>
  <text x="525" y="294" text-anchor="middle" font-size="8" fill="#047857">Hermes (Dell) ↔ Cohen (M70q)</text>

  <!-- Vantagens CLI -->
  <rect x="400" y="315" width="250" height="60" fill="#ecfdf5" rx="6" stroke="#6ee7b7" stroke-width="1"/>
  <text x="410" y="331" font-size="9" font-weight="600" fill="#065f46">VANTAGENS:</text>
  <text x="410" y="344" font-size="8" fill="#065f46">✅ systemd — uptime 24/7, restart automático</text>
  <text x="410" y="355" font-size="8" fill="#065f46">✅ Inter-agente — diagnóstico remoto</text>
  <text x="410" y="366" font-size="8" fill="#065f46">✅ Isolamento WSL2 + mascaramento creds</text>

  <!-- Dupla -->
  <rect x="400" y="388" width="250" height="24" fill="#059669" rx="6"/>
  <text x="525" y="404" text-anchor="middle" font-size="9" font-weight="600" fill="white">2 AGENTES — PERSISTÊNCIA TOTAL</text>

  <!-- Seta central -->
  <line x1="320" y1="240" x2="380" y2="240" stroke="#64748b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="350" y="230" text-anchor="middle" font-size="9" font-weight="700" fill="#475569">vs</text>

  <!-- Veredito -->
  <rect x="160" y="440" width="380" height="30" fill="#059669" rx="8" filter="url(#shadow)"/>
  <text x="350" y="460" text-anchor="middle" font-size="12" font-weight="700" fill="white">VEREDITO: CLI + WSL2 — diferença de categoria, não de grau</text>
</svg>