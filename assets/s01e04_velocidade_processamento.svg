<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="220" fill="#ffffff" rx="8"/>
  
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Velocidade de Processamento de Áudio</text>
  
  <!-- Eixo horizontal -->
  <line x1="120" y1="60" x2="120" y2="180" stroke="#bdc3c7" stroke-width="1"/>
  <text x="115" y="185" text-anchor="end" font-size="10" fill="#7f8c8d">0s</text>
  <text x="115" y="145" text-anchor="end" font-size="10" fill="#7f8c8d">1s</text>
  <text x="115" y="105" text-anchor="end" font-size="10" fill="#7f8c8d">2s</text>
  <text x="115" y="65" text-anchor="end" font-size="10" fill="#7f8c8d">3s</text>
  
  <!-- Grade -->
  <line x1="120" y1="140" x2="700" y2="140" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4"/>
  <line x1="120" y1="100" x2="700" y2="100" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Whisper: 1s -> 1/3 * 120px = 40px -->
  <text x="80" y="110" text-anchor="end" font-size="13" font-weight="600" fill="#2c3e50">Whisper (STT)</text>
  <rect x="120" y="100" width="180" height="32" fill="#2ECC71" rx="5" opacity="0.85"/>
  <text x="310" y="121" font-size="13" font-weight="bold" fill="#2ECC71">~1s</text>
  
  <!-- Omni: 3s -> 3/3 * 120px = 120px -->
  <text x="80" y="160" text-anchor="end" font-size="13" font-weight="600" fill="#2c3e50">Multimodal</text>
  <rect x="120" y="150" width="540" height="32" fill="#E74C3C" rx="5" opacity="0.85"/>
  <text x="670" y="171" font-size="13" font-weight="bold" fill="#E74C3C">~3s</text>
  
  <!-- Indicador de ganho -->
  <rect x="540" y="80" width="140" height="30" fill="#2ECC71" rx="15" opacity="0.15"/>
  <text x="610" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">Whisper 3x mais rápido</text>
  
  <text x="400" y="210" text-anchor="middle" font-size="10" fill="#95a5a6">Tempo de processamento para áudio de ~34 segundos</text>
</svg>