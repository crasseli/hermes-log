<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="280" fill="#ffffff" rx="8"/>
  
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Comparativo: Transcrição Literal vs Compreensão Semântica</text>
  
  <!-- Header row -->
  <rect x="40" y="45" width="720" height="36" fill="#ecf0f1" rx="4"/>
  <text x="120" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Aspecto</text>
  <text x="340" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#2ECC71">Whisper (STT)</text>
  <text x="600" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#E74C3C">Multimodal (Omni)</text>
  
  <!-- Row 1: Tipo de processamento -->
  <rect x="40" y="85" width="720" height="32" fill="#f8f9fa" rx="2"/>
  <text x="120" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">Processamento</text>
  <text x="340" y="106" text-anchor="middle" font-size="11" fill="#2c3e50">Literal palavra-por-palavra</text>
  <text x="600" y="106" text-anchor="middle" font-size="11" fill="#2c3e50">Semântico / interpretativo</text>
  
  <!-- Row 2: Precisao -->
  <rect x="40" y="119" width="720" height="32" fill="#ffffff" rx="2"/>
  <text x="120" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">Precisão</text>
  <text x="340" y="140" text-anchor="middle" font-size="11" fill="#2ECC71" font-weight="bold">95%+ (1 erro: NIN vs NIM)</text>
  <text x="600" y="140" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="bold">~60% (parafraseamento)</text>
  
  <!-- Row 3: Velocidade -->
  <rect x="40" y="153" width="720" height="32" fill="#f8f9fa" rx="2"/>
  <text x="120" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">Velocidade</text>
  <text x="340" y="174" text-anchor="middle" font-size="11" fill="#2ECC71" font-weight="bold">~1s</text>
  <text x="600" y="174" text-anchor="middle" font-size="11" fill="#E74C3C" font-weight="bold">~3s</text>
  
  <!-- Row 4: Acrônimos -->
  <rect x="40" y="187" width="720" height="32" fill="#ffffff" rx="2"/>
  <text x="120" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">Acrônimos</text>
  <text x="340" y="208" text-anchor="middle" font-size="11" fill="#2ECC71">Preserva ("DIA", "NIM")</text>
  <text x="600" y="208" text-anchor="middle" font-size="11" fill="#E74C3C">Interpreta ("DIA" → "de IA")</text>
  
  <!-- Row 5: Caso de uso ideal -->
  <rect x="40" y="221" width="720" height="32" fill="#f8f9fa" rx="2"/>
  <text x="120" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">Caso de uso ideal</text>
  <text x="340" y="242" text-anchor="middle" font-size="11" fill="#2c3e50">STT, legendas, atas, logs</text>
  <text x="600" y="242" text-anchor="middle" font-size="11" fill="#2c3e50">Resumo, intenção, análise</text>
  
  <!-- Borders -->
  <line x1="40" y1="45" x2="40" y2="253" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="760" y1="45" x2="760" y2="253" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="40" y1="253" x2="760" y2="253" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="230" y1="45" x2="230" y2="253" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="470" y1="45" x2="470" y2="253" stroke="#ecf0f1" stroke-width="1"/>
  
  <text x="400" y="273" text-anchor="middle" font-size="10" fill="#95a5a6">Whisper = precisão literal | Multimodal = compreensão contextual — ambos necessários, papéis distintos</text>
</svg>