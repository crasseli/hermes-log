<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="redArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="greenArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#dc2626" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="680" height="520" fill="#f8fafc" rx="12"/>

  <!-- Titulo -->
  <text x="340" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Mecanismo da Falha: Amnesia Pos-Restart</text>
  <text x="340" y="55" text-anchor="middle" font-size="12" fill="#94a3b8">Como a saturacao de memoria causa perda de contexto apos reinicio</text>

  <!-- ===== STEP 1 ===== -->
  <rect x="50" y="80" width="580" height="50" fill="white" rx="8" filter="url(#shadow)"/>
  <circle cx="80" cy="105" r="14" fill="#3b82f6"/>
  <text x="80" y="109" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>
  <text x="105" y="100" font-size="12" font-weight="600" fill="#1e293b">Tarefa ativa gera entradas na memoria</text>
  <text x="105" y="115" font-size="10" fill="#64748b">O agente registra fatos, decisoes e contexto durante a sessao</text>
  <!-- Barra de progresso -->
  <rect x="500" y="93" width="110" height="8" fill="#e2e8f0" rx="4"/>
  <rect x="500" y="93" width="44" height="8" fill="#3b82f6" rx="4"/>
  <text x="620" y="101" font-size="9" fill="#64748b">40%</text>

  <!-- Seta 1→2 -->
  <line x1="340" y1="130" x2="340" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <polygon points="340,155 335,148 345,148" fill="#94a3b8"/>

  <!-- ===== STEP 2 ===== -->
  <rect x="50" y="158" width="580" height="50" fill="white" rx="8" filter="url(#shadow)"/>
  <circle cx="80" cy="183" r="14" fill="#f59e0b"/>
  <text x="80" y="187" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>
  <text x="105" y="178" font-size="12" font-weight="600" fill="#1e293b">Memoria atinge 99% de capacidade</text>
  <text x="105" y="193" font-size="10" fill="#64748b">memory_char_limit de 3.200 chars quase completamente preenchido</text>
  <rect x="500" y="171" width="110" height="8" fill="#e2e8f0" rx="4"/>
  <rect x="500" y="171" width="108" height="8" fill="#f59e0b" rx="4"/>
  <text x="620" y="179" font-size="9" fill="#d97706" font-weight="700">99%</text>

  <!-- Seta 2→3 -->
  <polygon points="340,233 335,226 345,226" fill="#94a3b8"/>

  <!-- ===== STEP 3 (CRITICO) ===== -->
  <rect x="50" y="236" width="580" height="50" fill="#fef2f2" rx="8" stroke="#dc2626" stroke-width="1.5"/>
  <circle cx="80" cy="261" r="14" fill="#dc2626" filter="url(#glow)"/>
  <text x="80" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>
  <text x="105" y="256" font-size="12" font-weight="600" fill="#dc2626">Novas entradas forcam substituicao das antigas</text>
  <text x="105" y="271" font-size="10" fill="#991b1b">Contexto da tarefa corrente e compactado ou removido para liberar espaco</text>
  <!-- X vermelho -->
  <text x="615" y="265" font-size="16" fill="#dc2626" font-weight="700">X</text>

  <!-- Seta 3→4 -->
  <polygon points="340,311 335,304 345,304" fill="#94a3b8"/>

  <!-- ===== STEP 4 ===== -->
  <rect x="50" y="314" width="580" height="50" fill="white" rx="8" filter="url(#shadow)"/>
  <circle cx="80" cy="339" r="14" fill="#8b5cf6"/>
  <text x="80" y="343" text-anchor="middle" font-size="11" font-weight="700" fill="white">4</text>
  <text x="105" y="334" font-size="12" font-weight="600" fill="#1e293b">Restart do gateway reinicia a conversa</text>
  <text x="105" y="349" font-size="10" fill="#64748b">Comando /new ou reinicio do servico limpa o contexto da sessao ativa</text>
  <text x="615" y="343" font-size="12" fill="#8b5cf6">&#x21bb;</text>

  <!-- Seta 4→5 -->
  <polygon points="340,389 335,382 345,382" fill="#94a3b8"/>

  <!-- ===== STEP 5 (RESULTADO) ===== -->
  <rect x="50" y="392" width="580" height="55" fill="#fef2f2" rx="8" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3"/>
  <circle cx="80" cy="419" r="14" fill="#dc2626"/>
  <text x="80" y="423" text-anchor="middle" font-size="11" font-weight="700" fill="white">5</text>
  <text x="105" y="411" font-size="12" font-weight="600" fill="#dc2626">AMNESIA: Agente acorda sem contexto da tarefa</text>
  <text x="105" y="426" font-size="10" fill="#991b1b">Memoria persistente injetada, mas SEM o contexto que foi removido no passo 3</text>
  <text x="105" y="441" font-size="10" fill="#991b1b">O agente volta a falar de assuntos nao relacionados como se fosse outra sessao</text>

  <!-- ===== CAIXA DE SOLUCAO ===== -->
  <rect x="50" y="460" width="580" height="50" fill="#ecfdf5" rx="8" stroke="#059669" stroke-width="1.5"/>
  <text x="340" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">SOLUCAO: memory_char_limit 3.200 → 10.000 | user_char_limit 2.000 → 5.000</text>
  <text x="340" y="498" text-anchor="middle" font-size="10" fill="#047857">Ocupacao cai de 99% para 31% — espaco suficiente para preservar contexto de tarefas ativas</text>
</svg>
