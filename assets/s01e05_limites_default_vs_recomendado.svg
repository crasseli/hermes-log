<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="defGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="twoGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="ourGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ee7b7"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="700" height="420" fill="#f8fafc" rx="14"/>

  <!-- Cabecalho -->
  <rect x="30" y="18" width="640" height="48" fill="white" rx="10" filter="url(#sh)"/>
  <text x="350" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Limites de Memoria: Default vs Recomendado vs Aplicado</text>
  <text x="350" y="56" text-anchor="middle" font-size="11" fill="#94a3b8">Calculo de 2% do contexto (Issue #5320) — Modelo com 128k tokens</text>

  <!-- ===== MEMORY CHART ===== -->
  <rect x="30" y="78" width="640" height="145" fill="white" rx="10" filter="url(#sh)"/>
  <text x="50" y="100" font-size="13" font-weight="700" fill="#1e293b">memory_char_limit</text>

  <!-- Grid vertical -->
  <line x1="150" y1="108" x2="150" y2="205" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="290" y1="108" x2="290" y2="205" stroke="#f1f5f9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="430" y1="108" x2="430" y2="205" stroke="#f1f5f9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="570" y1="108" x2="570" y2="205" stroke="#f1f5f9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="640" y1="108" x2="640" y2="205" stroke="#e2e8f0" stroke-width="0.5"/>

  <text x="150" y="215" text-anchor="middle" font-size="8" fill="#94a3b8">0</text>
  <text x="290" y="215" text-anchor="middle" font-size="8" fill="#94a3b8">2.800</text>
  <text x="430" y="215" text-anchor="middle" font-size="8" fill="#94a3b8">5.600</text>
  <text x="570" y="215" text-anchor="middle" font-size="8" fill="#94a3b8">8.400</text>
  <text x="640" y="215" text-anchor="middle" font-size="8" fill="#94a3b8">10.000</text>

  <!-- Barra Default (2.200) -->
  <rect x="150" y="112" width="55" height="26" fill="url(#defGrad)" rx="4"/>
  <text x="210" y="130" font-size="11" font-weight="600" fill="#475569">2.200</text>
  <text x="245" y="130" font-size="8" fill="#94a3b8">default</text>

  <!-- Barra 2% contexto (8.800) -->
  <rect x="150" y="146" width="220" height="26" fill="url(#twoGrad)" rx="4"/>
  <text x="375" y="164" font-size="11" font-weight="600" fill="#2563eb">8.800</text>
  <text x="415" y="164" font-size="8" fill="#93c5fd">2% do contexto</text>

  <!-- Barra Aplicado (10.000) -->
  <rect x="150" y="180" width="490" height="26" fill="url(#ourGrad)" rx="4"/>
  <text x="645" y="198" font-size="11" font-weight="700" fill="#059669">10.000</text>
  <rect x="440" y="182" width="56" height="22" fill="#ecfdf5" rx="4" stroke="#059669" stroke-width="0.8"/>
  <text x="468" y="197" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">+13,6%</text>

  <!-- ===== USER CHART ===== -->
  <rect x="30" y="232" width="640" height="145" fill="white" rx="10" filter="url(#sh)"/>
  <text x="50" y="254" font-size="13" font-weight="700" fill="#1e293b">user_char_limit</text>

  <!-- Grid vertical -->
  <line x1="150" y1="262" x2="150" y2="358" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="275" y1="262" x2="275" y2="358" stroke="#f1f5f9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="400" y1="262" x2="400" y2="358" stroke="#f1f5f9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="525" y1="262" x2="525" y2="358" stroke="#f1f5f9" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="640" y1="262" x2="640" y2="358" stroke="#e2e8f0" stroke-width="0.5"/>

  <text x="150" y="368" text-anchor="middle" font-size="8" fill="#94a3b8">0</text>
  <text x="275" y="368" text-anchor="middle" font-size="8" fill="#94a3b8">1.500</text>
  <text x="400" y="368" text-anchor="middle" font-size="8" fill="#94a3b8">3.000</text>
  <text x="525" y="368" text-anchor="middle" font-size="8" fill="#94a3b8">4.500</text>
  <text x="640" y="368" text-anchor="middle" font-size="8" fill="#94a3b8">5.500</text>

  <!-- Barra Default (1.375) -->
  <rect x="150" y="266" width="34" height="26" fill="url(#defGrad)" rx="4"/>
  <text x="190" y="284" font-size="11" font-weight="600" fill="#475569">1.375</text>
  <text x="228" y="284" font-size="8" fill="#94a3b8">default</text>

  <!-- Barra 2% contexto (5.500) -->
  <rect x="150" y="300" width="490" height="26" fill="url(#twoGrad)" rx="4"/>
  <text x="645" y="318" font-size="11" font-weight="600" fill="#2563eb">5.500</text>
  <text x="645" y="328" font-size="8" fill="#93c5fd">2% ctx</text>

  <!-- Barra Aplicado (5.000) -->
  <rect x="150" y="334" width="445" height="26" fill="url(#ourGrad)" rx="4"/>
  <text x="600" y="352" font-size="11" font-weight="700" fill="#059669">5.000</text>
  <rect x="468" y="336" width="48" height="22" fill="#fefce8" rx="4" stroke="#d97706" stroke-width="0.8"/>
  <text x="492" y="351" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">-9,1%</text>

  <!-- Nota explicativa -->
  <rect x="30" y="385" width="640" height="26" fill="#fffbeb" rx="6" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="350" y="403" text-anchor="middle" font-size="9" fill="#92400e">user_char_limit de 5.000 fica 9% abaixo do calculo ideal (5.500), mas o perfil de usuario cresce lentamente — ajuste para 6.000 se atingir 80%</text>
</svg>
