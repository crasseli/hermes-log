<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="slateBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="680" height="380" fill="#f8fafc" rx="12"/>

  <!-- Card -->
  <rect x="30" y="20" width="620" height="340" fill="white" rx="12" filter="url(#cardShadow)"/>

  <!-- Titulo -->
  <text x="340" y="52" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Calculo de 2% do Contexto vs Config Aplicado</text>
  <text x="340" y="70" text-anchor="middle" font-size="11" fill="#94a3b8">Proposta do GitHub Issue #5320 — Modelo z-ai/glm-5.1 (128k context)</text>

  <!-- Grid vertical -->
  <line x1="130" y1="90" x2="130" y2="310" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="252" y1="90" x2="252" y2="310" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="374" y1="90" x2="374" y2="310" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="496" y1="90" x2="496" y2="310" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="618" y1="90" x2="618" y2="310" stroke="#e2e8f0" stroke-width="0.5"/>

  <!-- Labels eixo X -->
  <text x="130" y="325" text-anchor="middle" font-size="10" fill="#94a3b8">0</text>
  <text x="252" y="325" text-anchor="middle" font-size="10" fill="#94a3b8">3.000</text>
  <text x="374" y="325" text-anchor="middle" font-size="10" fill="#94a3b8">6.000</text>
  <text x="496" y="325" text-anchor="middle" font-size="10" fill="#94a3b8">9.000</text>
  <text x="618" y="325" text-anchor="middle" font-size="10" fill="#94a3b8">12.000</text>
  <text x="374" y="345" text-anchor="middle" font-size="10" fill="#64748b">caracteres</text>

  <!-- ===== BARRA 1: MEMORY ===== -->

  <!-- Default hardcoded (2.200) -->
  <rect x="130" y="105" width="48" height="40" fill="url(#slateBar)" rx="4" opacity="0.7"/>
  <text x="182" y="129" font-size="10" font-weight="600" fill="#475569">2.200</text>

  <!-- 2% do contexto (8.800) -->
  <rect x="130" y="150" width="192" height="40" fill="url(#blueBar)" rx="4" opacity="0.8"/>
  <text x="326" y="174" font-size="10" font-weight="600" fill="#2563eb">8.800</text>

  <!-- Config aplicado (10.000) -->
  <rect x="130" y="195" width="218" height="40" fill="url(#greenBar)" rx="4"/>
  <text x="352" y="219" font-size="10" font-weight="700" fill="#059669">10.000</text>

  <!-- Badge +13,6% -->
  <rect x="368" y="205" width="60" height="20" fill="#ecfdf5" rx="4" stroke="#059669" stroke-width="1"/>
  <text x="398" y="219" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">+13,6%</text>

  <!-- Label esquerda -->
  <text x="120" y="129" text-anchor="end" font-size="10" fill="#475569">Default</text>
  <text x="120" y="174" text-anchor="end" font-size="10" fill="#2563eb">2% ctx</text>
  <text x="120" y="219" text-anchor="end" font-size="10" font-weight="600" fill="#059669">Aplicado</text>

  <!-- Separador -->
  <text x="340" y="252" text-anchor="middle" font-size="9" fill="#94a3b8">memory_char_limit</text>
  <line x1="130" y1="258" x2="618" y2="258" stroke="#e2e8f0" stroke-width="0.5"/>

  <!-- ===== BARRA 2: USER ===== -->

  <!-- Default hardcoded (1.375) -->
  <rect x="130" y="268" width="30" height="32" fill="url(#slateBar)" rx="4" opacity="0.7"/>
  <text x="164" y="288" font-size="10" font-weight="600" fill="#475569">1.375</text>

  <!-- 2% do contexto (5.500) -->
  <rect x="130" y="268" width="120" height="32" fill="url(#blueBar)" rx="4" opacity="0.0"/>
  <!-- Mostrar so como referencia -->
  <line x1="250" y1="265" x2="250" y2="303" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="255" y="278" font-size="9" fill="#2563eb">5.500 (2% ctx)</text>

  <!-- Config aplicado (5.000) -->
  <rect x="130" y="305" width="109" height="32" fill="url(#greenBar)" rx="4"/>
  <text x="243" y="325" font-size="10" font-weight="700" fill="#059669">5.000</text>

  <!-- Badge -9,1% -->
  <rect x="258" y="311" width="52" height="18" fill="#fef3c7" rx="4" stroke="#d97706" stroke-width="1"/>
  <text x="284" y="324" text-anchor="middle" font-size="9" font-weight="700" fill="#d97706">-9,1%</text>

  <!-- Label esquerda -->
  <text x="120" y="288" text-anchor="end" font-size="10" fill="#475569">Default</text>
  <text x="120" y="325" text-anchor="end" font-size="10" font-weight="600" fill="#059669">Aplicado</text>

  <!-- Nota -->
  <text x="340" y="362" text-anchor="middle" font-size="9" fill="#64748b">user_char_limit de 5.000 fica 9% abaixo do calculo de 2%, mas user_profile e mais estavel e cresce lentamente</text>
</svg>
