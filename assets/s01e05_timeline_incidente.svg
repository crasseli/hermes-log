<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="720" height="380" fill="#f8fafc" rx="14"/>

  <!-- Cabecalho -->
  <rect x="25" y="14" width="670" height="42" fill="white" rx="10" filter="url(#sh)"/>
  <text x="360" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Timeline do Incidente — 30 de Abril de 2026</text>
  <text x="360" y="50" text-anchor="middle" font-size="10" fill="#94a3b8">Do diagnóstico à correção em ambas as instâncias</text>

  <!-- Linha do tempo central -->
  <line x1="70" y1="140" x2="650" y2="140" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>

  <!-- Evento 1 -->
  <circle cx="100" cy="140" r="12" fill="#fbbf24" stroke="white" stroke-width="2"/>
  <text x="100" y="144" text-anchor="middle" font-size="8" font-weight="700" fill="white">1</text>
  <rect x="62" y="85" width="76" height="40" fill="white" rx="6" filter="url(#sh)"/>
  <text x="100" y="100" text-anchor="middle" font-size="8" font-weight="600" fill="#1e293b">Amnésia</text>
  <text x="100" y="111" text-anchor="middle" font-size="7" fill="#64748b">pós-restart</text>
  <text x="100" y="121" text-anchor="middle" font-size="7" fill="#dc2626" font-weight="600">detectada</text>
  <text x="100" y="168" text-anchor="middle" font-size="7" fill="#94a3b8">~12:20</text>

  <!-- Evento 2 -->
  <circle cx="220" cy="140" r="12" fill="#f59e0b" stroke="white" stroke-width="2"/>
  <text x="220" y="144" text-anchor="middle" font-size="8" font-weight="700" fill="white">2</text>
  <rect x="182" y="85" width="76" height="40" fill="white" rx="6" filter="url(#sh)"/>
  <text x="220" y="100" text-anchor="middle" font-size="8" font-weight="600" fill="#1e293b">Diagnóstico</text>
  <text x="220" y="111" text-anchor="middle" font-size="7" fill="#64748b">Cohen identifica</text>
  <text x="220" y="121" text-anchor="middle" font-size="7" fill="#b45309" font-weight="600">limite 99%</text>
  <text x="220" y="168" text-anchor="middle" font-size="7" fill="#94a3b8">~12:25</text>

  <!-- Evento 3 -->
  <circle cx="340" cy="140" r="12" fill="#3b82f6" stroke="white" stroke-width="2"/>
  <text x="340" y="144" text-anchor="middle" font-size="8" font-weight="700" fill="white">3</text>
  <rect x="302" y="85" width="76" height="40" fill="white" rx="6" filter="url(#sh)"/>
  <text x="340" y="100" text-anchor="middle" font-size="8" font-weight="600" fill="#1e293b">Pesquisa</text>
  <text x="340" y="111" text-anchor="middle" font-size="7" fill="#64748b">Issues #5320</text>
  <text x="340" y="121" text-anchor="middle" font-size="7" fill="#2563eb" font-weight="600">#16831, #11665</text>
  <text x="340" y="168" text-anchor="middle" font-size="7" fill="#94a3b8">~12:30</text>

  <!-- Evento 4 -->
  <circle cx="460" cy="140" r="12" fill="#059669" stroke="white" stroke-width="2"/>
  <text x="460" y="144" text-anchor="middle" font-size="8" font-weight="700" fill="white">4</text>
  <rect x="422" y="85" width="76" height="40" fill="white" rx="6" filter="url(#sh)"/>
  <text x="460" y="100" text-anchor="middle" font-size="8" font-weight="600" fill="#1e293b">Correção</text>
  <text x="460" y="111" text-anchor="middle" font-size="7" fill="#64748b">Cohen aplica</text>
  <text x="460" y="121" text-anchor="middle" font-size="7" fill="#059669" font-weight="600">10k / 5k</text>
  <text x="460" y="168" text-anchor="middle" font-size="7" fill="#94a3b8">~12:32</text>

  <!-- Evento 5 -->
  <circle cx="580" cy="140" r="12" fill="#059669" stroke="white" stroke-width="2"/>
  <text x="580" y="144" text-anchor="middle" font-size="8" font-weight="700" fill="white">5</text>
  <rect x="542" y="85" width="76" height="40" fill="white" rx="6" filter="url(#sh)"/>
  <text x="580" y="100" text-anchor="middle" font-size="8" font-weight="600" fill="#1e293b">Correção</text>
  <text x="580" y="111" text-anchor="middle" font-size="7" fill="#64748b">Hermes aplica</text>
  <text x="580" y="121" text-anchor="middle" font-size="7" fill="#059669" font-weight="600">10k / 5k</text>
  <text x="580" y="168" text-anchor="middle" font-size="7" fill="#94a3b8">~12:50</text>

  <!-- Detalhes abaixo da timeline -->
  <rect x="25" y="200" width="670" height="90" fill="white" rx="10" filter="url(#sh)"/>

  <text x="45" y="220" font-size="10" font-weight="700" fill="#1e293b">Causa Raiz</text>
  <text x="45" y="235" font-size="9" fill="#64748b">memory_char_limit em 3.200 chars com ocupação de 99% — sem espaço para registrar contexto de tarefa ativa.</text>
  <text x="45" y="250" font-size="9" fill="#64748b">Após restart, o agente perde o fio da meada porque a memória persistente não continha o contexto.</text>

  <line x1="45" y1="260" x2="675" y2="260" stroke="#f1f5f9" stroke-width="0.5"/>

  <text x="45" y="276" font-size="10" font-weight="700" fill="#059669">Resultado</text>
  <text x="45" y="291" font-size="9" fill="#64748b">Ocupação média caiu de 90% para 32%. Folga de 6.800+ chars em memory e 3.100+ chars em user_profile.</text>

  <!-- Badges de status -->
  <rect x="25" y="305" width="105" height="30" fill="#ecfdf5" rx="6" stroke="#059669" stroke-width="1"/>
  <text x="77" y="320" text-anchor="middle" font-size="8" font-weight="700" fill="#047857">Cohen: CORRIGIDO</text>
  <text x="77" y="330" text-anchor="middle" font-size="7" fill="#059669">31% ocupação</text>

  <rect x="140" y="305" width="105" height="30" fill="#ecfdf5" rx="6" stroke="#059669" stroke-width="1"/>
  <text x="192" y="320" text-anchor="middle" font-size="8" font-weight="700" fill="#047857">Hermes: CORRIGIDO</text>
  <text x="192" y="330" text-anchor="middle" font-size="7" fill="#059669">27% ocupação</text>

  <rect x="255" y="305" width="145" height="30" fill="#fefce8" rx="6" stroke="#d97706" stroke-width="1"/>
  <text x="327" y="320" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Bug #11665: PENDENTE</text>
  <text x="327" y="330" text-anchor="middle" font-size="7" fill="#b45309">CLI/MCP ignora config.yaml</text>

  <rect x="410" y="305" width="155" height="30" fill="#eff6ff" rx="6" stroke="#2563eb" stroke-width="1"/>
  <text x="487" y="320" text-anchor="middle" font-size="8" font-weight="700" fill="#1d4ed8">Issue #5320: PROPOSTA</text>
  <text x="487" y="330" text-anchor="middle" font-size="7" fill="#3b82f6">Auto-escala 2% do contexto</text>

  <!-- Creditos -->
  <text x="360" y="365" text-anchor="middle" font-size="8" fill="#94a3b8">Christian Rasseli, Cohen (agente remoto), Hermes (agente local) — 30 de abril de 2026</text>
</svg>
